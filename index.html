<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premas Shop - Fresh Essentials Delivered Fast</title>
    <meta name="description" content="Get your daily essentials delivered to your doorstep in minutes. Fresh water, groceries, and more.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .animate-in {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .btn-primary {
            @apply bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg transition-colors;
        }
        .btn-secondary {
            @apply bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2 px-4 rounded-lg transition-colors;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app">
        <!-- Loading State -->
        <div id="loading" class="min-h-screen flex items-center justify-center bg-green-600">
            <div class="text-center">
                <div class="w-16 h-16 bg-white rounded-lg flex items-center justify-center mx-auto mb-4">
                    <span class="text-green-600 font-bold text-2xl">P</span>
                </div>
                <h1 class="text-2xl font-bold text-white mb-2">Premas Shop</h1>
                <p class="text-green-100">Loading your shopping experience...</p>
                <div class="mt-4">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-white mx-auto"></div>
                </div>
            </div>
        </div>

        <!-- Main App -->
        <div id="main-app" class="hidden">
            <!-- Header -->
            <header class="bg-green-600 text-white sticky top-0 z-40">
                <div class="px-4 py-3">
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center space-x-2">
                            <div class="w-8 h-8 bg-white/20 backdrop-blur-sm rounded-lg flex items-center justify-center">
                                <span class="text-white font-bold text-lg">P</span>
                            </div>
                            <div>
                                <p class="text-lg font-bold">Premas Shop</p>
                            </div>
                        </div>
                        <div class="relative">
                            <button id="cart-btn" class="relative p-2 text-white hover:bg-white/10 rounded-lg transition-colors">
                                <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                                <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">0</span>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Search -->
                    <div class="relative">
                        <input type="text" id="search-input" placeholder="Search for products..." class="w-full px-4 py-2 rounded-lg text-gray-900 placeholder-gray-500 pr-10">
                        <i data-lucide="search" class="absolute right-3 top-2.5 w-5 h-5 text-gray-400"></i>
                    </div>
                </div>
            </header>

            <!-- Hero Section -->
            <section class="bg-gradient-to-b from-green-600 to-green-500 text-white px-4 py-8">
                <div class="max-w-md mx-auto text-center">
                    <h1 class="text-2xl font-bold mb-2">Fresh Essentials, Fast Delivery</h1>
                    <p class="text-green-100 mb-6">Get water, groceries, and daily essentials delivered to your doorstep in minutes!</p>
                    <button class="bg-white text-green-600 px-6 py-2 rounded-lg font-semibold hover:bg-green-50 transition-colors">
                        Start Shopping
                    </button>
                </div>
            </section>

            <!-- Categories -->
            <section class="px-4 py-6">
                <h2 class="text-lg font-bold text-gray-900 mb-4">Shop by Category</h2>
                <div class="grid grid-cols-4 gap-4">
                    <div class="text-center category-btn cursor-pointer" data-category="water">
                        <div class="w-16 h-16 bg-blue-100 rounded-lg flex items-center justify-center mx-auto mb-2 hover:bg-blue-200 transition-colors">
                            <i data-lucide="package" class="w-8 h-8 text-blue-600"></i>
                        </div>
                        <p class="text-sm text-gray-700">Water</p>
                    </div>
                    <div class="text-center category-btn cursor-pointer" data-category="groceries">
                        <div class="w-16 h-16 bg-orange-100 rounded-lg flex items-center justify-center mx-auto mb-2 hover:bg-orange-200 transition-colors">
                            <i data-lucide="package" class="w-8 h-8 text-orange-600"></i>
                        </div>
                        <p class="text-sm text-gray-700">Groceries</p>
                    </div>
                    <div class="text-center category-btn cursor-pointer" data-category="dairy">
                        <div class="w-16 h-16 bg-purple-100 rounded-lg flex items-center justify-center mx-auto mb-2 hover:bg-purple-200 transition-colors">
                            <i data-lucide="package" class="w-8 h-8 text-purple-600"></i>
                        </div>
                        <p class="text-sm text-gray-700">Dairy</p>
                    </div>
                    <div class="text-center category-btn cursor-pointer" data-category="snacks">
                        <div class="w-16 h-16 bg-red-100 rounded-lg flex items-center justify-center mx-auto mb-2 hover:bg-red-200 transition-colors">
                            <i data-lucide="package" class="w-8 h-8 text-red-600"></i>
                        </div>
                        <p class="text-sm text-gray-700">Snacks</p>
                    </div>
                </div>
            </section>

            <!-- Products -->
            <section class="px-4 py-6">
                <h2 class="text-lg font-bold text-gray-900 mb-4">Popular Products</h2>
                <div id="products-grid" class="grid grid-cols-2 gap-4">
                    <!-- Products will be loaded here -->
                </div>
            </section>

            <!-- Bottom Navigation -->
            <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40">
                <div class="grid grid-cols-4 py-2">
                    <button class="nav-btn flex flex-col items-center py-2 text-green-600" data-page="home">
                        <i data-lucide="home" class="w-5 h-5 mb-1"></i>
                        <span class="text-xs">Home</span>
                    </button>
                    <button class="nav-btn flex flex-col items-center py-2 text-gray-400" data-page="orders">
                        <i data-lucide="shopping-bag" class="w-5 h-5 mb-1"></i>
                        <span class="text-xs">Orders</span>
                    </button>
                    <button class="nav-btn flex flex-col items-center py-2 text-gray-400" data-page="profile">
                        <i data-lucide="user" class="w-5 h-5 mb-1"></i>
                        <span class="text-xs">Profile</span>
                    </button>
                    <button class="nav-btn flex flex-col items-center py-2 text-gray-400" data-page="more">
                        <i data-lucide="menu" class="w-5 h-5 mb-1"></i>
                        <span class="text-xs">More</span>
                    </button>
                </div>
            </nav>
        </div>

        <!-- Cart Modal -->
        <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden">
            <div class="fixed bottom-0 left-0 right-0 bg-white rounded-t-2xl max-h-96 overflow-y-auto">
                <div class="p-4">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-bold">Your Cart</h3>
                        <button id="close-cart" class="text-gray-400 hover:text-gray-600">
                            <i data-lucide="x" class="w-6 h-6"></i>
                        </button>
                    </div>
                    <div id="cart-items" class="space-y-3 mb-4">
                        <!-- Cart items will be shown here -->
                    </div>
                    <div class="border-t pt-4">
                        <div class="flex justify-between items-center mb-4">
                            <span class="font-semibold">Total:</span>
                            <span id="cart-total" class="text-xl font-bold text-green-600">₹0</span>
                        </div>
                        <button class="w-full btn-primary">Proceed to Checkout</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://kpyvndiqvwushuhwxvon.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtweXZuZGlxdnd1c2h1aHd4dm9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI1ODU0OTIsImV4cCI6MjA3ODE2MTQ5Mn0.TqoLz-r-XZpRvyWhBXyKKQjTrpSGX4bGwQHIM3kGTMs';
        
        // Initialize Supabase
        const { createClient } = supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // App State
        let cart = [];
        let products = [];
        let currentUser = null;

        // Sample products data (matching your local app)
        const sampleProducts = [
            { id: 1, name: 'Mineral Water', description: '20L Bottle', price: 40, category: 'water', image: null },
            { id: 2, name: 'Fresh Milk', description: '1L Pack', price: 60, category: 'dairy', image: null },
            { id: 3, name: 'Bread', description: 'Fresh White Bread', price: 35, category: 'groceries', image: null },
            { id: 4, name: 'Eggs', description: 'Pack of 12', price: 80, category: 'dairy', image: null },
            { id: 5, name: 'Rice', description: '5kg Bag', price: 250, category: 'groceries', image: null },
            { id: 6, name: 'Chips', description: 'Potato Chips', price: 20, category: 'snacks', image: null }
        ];

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Initializing Premas Shop...');
            
            // Initialize Lucide icons
            lucide.createIcons();
            
            // Load products
            loadProducts();
            
            // Setup event listeners
            setupEventListeners();
            
            // Hide loading, show main app
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                lucide.createIcons(); // Re-initialize icons for new content
            }, 1000);
        });

        function loadProducts() {
            // Use sample products for now (can be replaced with Supabase fetch)
            products = sampleProducts;
            renderProducts(products);
        }

        function renderProducts(productsToRender) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = productsToRender.map(product => `
                <div class="bg-white rounded-lg border border-gray-200 overflow-hidden flex flex-col h-full">
                    <div class="aspect-square bg-gray-50 rounded-t-lg flex items-center justify-center">
                        <i data-lucide="package" class="w-12 h-12 text-gray-400"></i>
                    </div>
                    <div class="p-3 flex-1 flex flex-col">
                        <div class="flex-1">
                            <h3 class="font-medium text-gray-900 mb-1">${product.name}</h3>
                            <p class="text-sm text-gray-500 mb-2">${product.description}</p>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-base font-bold text-gray-900">₹${product.price}</span>
                            <button class="add-to-cart-btn btn-primary text-sm px-3 py-1" data-product='${JSON.stringify(product)}'>
                                Add
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // Re-initialize icons for new content
            lucide.createIcons();
            
            // Add click handlers to new buttons
            document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const product = JSON.parse(this.dataset.product);
                    addToCart(product);
                });
            });
        }

        function setupEventListeners() {
            // Cart button
            document.getElementById('cart-btn').addEventListener('click', showCart);
            
            // Close cart
            document.getElementById('close-cart').addEventListener('click', hideCart);
            
            // Search
            document.getElementById('search-input').addEventListener('input', function(e) {
                const query = e.target.value.toLowerCase();
                const filtered = products.filter(p => 
                    p.name.toLowerCase().includes(query) || 
                    p.description.toLowerCase().includes(query)
                );
                renderProducts(filtered);
            });
            
            // Categories
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const category = this.dataset.category;
                    const filtered = category === 'all' ? products : products.filter(p => p.category === category);
                    renderProducts(filtered);
                });
            });
            
            // Navigation
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    // Remove active state from all
                    document.querySelectorAll('.nav-btn').forEach(b => {
                        b.classList.remove('text-green-600');
                        b.classList.add('text-gray-400');
                    });
                    // Add active state to clicked
                    this.classList.remove('text-gray-400');
                    this.classList.add('text-green-600');
                    
                    const page = this.dataset.page;
                    showToast(`${page.charAt(0).toUpperCase() + page.slice(1)} page coming soon!`);
                });
            });
        }

        function addToCart(product) {
            const existingItem = cart.find(item => item.id === product.id);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCartCount();
            showToast(`${product.name} added to cart!`, existingItem ? existingItem.quantity : 1);
        }

        function updateCartCount() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').textContent = totalItems;
        }

        function showCart() {
            renderCartItems();
            document.getElementById('cart-modal').classList.remove('hidden');
        }

        function hideCart() {
            document.getElementById('cart-modal').classList.add('hidden');
        }

        function renderCartItems() {
            const cartItemsDiv = document.getElementById('cart-items');
            const cartTotal = document.getElementById('cart-total');
            
            if (cart.length === 0) {
                cartItemsDiv.innerHTML = '<p class="text-gray-500 text-center py-4">Your cart is empty</p>';
                cartTotal.textContent = '₹0';
                return;
            }
            
            cartItemsDiv.innerHTML = cart.map(item => `
                <div class="flex items-center justify-between bg-gray-50 p-3 rounded-lg">
                    <div class="flex-1">
                        <h4 class="font-medium text-gray-900">${item.name}</h4>
                        <p class="text-sm text-gray-500">₹${item.price} x ${item.quantity}</p>
                    </div>
                    <div class="flex items-center space-x-2">
                        <button class="quantity-btn w-6 h-6 bg-gray-200 rounded-full flex items-center justify-center" data-id="${item.id}" data-action="decrease">
                            <i data-lucide="minus" class="w-3 h-3"></i>
                        </button>
                        <span class="font-medium w-8 text-center">${item.quantity}</span>
                        <button class="quantity-btn w-6 h-6 bg-gray-200 rounded-full flex items-center justify-center" data-id="${item.id}" data-action="increase">
                            <i data-lucide="plus" class="w-3 h-3"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotal.textContent = `₹${total}`;
            
            // Re-initialize icons
            lucide.createIcons();
            
            // Add quantity button handlers
            document.querySelectorAll('.quantity-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    const action = this.dataset.action;
                    updateQuantity(id, action);
                });
            });
        }

        function updateQuantity(productId, action) {
            const item = cart.find(item => item.id === productId);
            if (!item) return;
            
            if (action === 'increase') {
                item.quantity += 1;
            } else if (action === 'decrease') {
                item.quantity -= 1;
                if (item.quantity === 0) {
                    cart = cart.filter(item => item.id !== productId);
                }
            }
            
            updateCartCount();
            renderCartItems();
        }

        function showToast(message, quantity = null) {
            // Remove existing toast
            const existingToast = document.getElementById('toast-notification');
            if (existingToast) {
                existingToast.remove();
            }
            
            // Create new toast
            const toast = document.createElement('div');
            toast.id = 'toast-notification';
            toast.className = 'fixed top-4 right-4 bg-white rounded-lg shadow-lg border border-gray-200 p-4 z-50 animate-in';
            toast.innerHTML = `
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-2">
                        <div class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center">
                            <i data-lucide="shopping-cart" class="w-4 h-4 text-green-600"></i>
                        </div>
                        <div>
                            <p class="text-sm text-gray-900">${message}</p>
                            ${quantity ? `<p class="text-xs text-gray-500">Quantity: ${quantity}</p>` : ''}
                        </div>
                    </div>
                    <button class="text-gray-400 hover:text-gray-600" onclick="document.getElementById('toast-notification').remove()">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
            `;
            
            document.body.appendChild(toast);
            lucide.createIcons();
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                if (document.getElementById('toast-notification')) {
                    toast.remove();
                }
            }, 5000);
        }

        console.log('Premas Shop scripts loaded!');
    </script>
</body>
</html>
